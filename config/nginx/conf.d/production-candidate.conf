map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  server_name _;
  client_max_body_size 512m;

  proxy_read_timeout 1800s;
  proxy_send_timeout 1800s;
  proxy_connect_timeout 60s;

  root /usr/share/nginx/html;
  index index.html;

  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, immutable";
  }

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files /index.html =404;
  }

  location = /runtime-config.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files /runtime-config.js =404;
  }

  location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri $uri/ /index.html;
  }

  location ~ ^/(api|web|web_editor|mail|report|longpolling)(/|$) {
    proxy_pass http://odoo:8069;
    proxy_redirect off;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Odoo-DB ${ODOO_DB};
    proxy_set_header X-DB ${ODOO_DB};
    proxy_set_header X-Odoo-DB-Locked ${ODOO_DB};
  }

  location /websocket {
    proxy_pass http://odoo:8069/websocket;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Odoo-DB ${ODOO_DB};
    proxy_set_header X-DB ${ODOO_DB};
    proxy_set_header X-Odoo-DB-Locked ${ODOO_DB};
  }
}
