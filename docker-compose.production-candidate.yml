name: ${PRODUCTION_COMPOSE_PROJECT:?PRODUCTION_COMPOSE_PROJECT is required}

services:
  db:
    image: postgres:15@sha256:386166d1a81e5ed9dfbbbbd8d4abe439d35ced9cc845eb3d09bc43b0b3860117
    platform: linux/amd64
    restart: unless-stopped
    environment:
      # The application database is deliberately not auto-created by Postgres.
      POSTGRES_DB: postgres
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - database_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine@sha256:b1addbe72465a718643cff9e60a58e6df1841e29d6d7d60c9a85d8d72f08d1a7
    platform: linux/amd64
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  odoo:
    image: ${ODOO_IMAGE_REF:?ODOO_IMAGE_REF with image@sha256 digest is required}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      TARGET_DB: ${TARGET_DB:?TARGET_DB is required}
      DB_NAME: ${TARGET_DB:?TARGET_DB is required}
      ODOO_DB: ${TARGET_DB:?TARGET_DB is required}
      ODOO_DBFILTER: ^${TARGET_DB:?TARGET_DB is required}$$
      PLATFORM_RELEASE_DB: ${PLATFORM_RELEASE_DB:?PLATFORM_RELEASE_DB is required}
      ODOO_CONF_OUT: /opt/sce-runtime/config/odoo.conf
      TMPDIR: /opt/sce-runtime/tmp
      ADMIN_PASSWD: ${ADMIN_PASSWD}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
      SC_ENVIRONMENT: ${SC_ENVIRONMENT:?SC_ENVIRONMENT is required}
      SC_FILESTORE_SCOPE: ${TARGET_DB:?TARGET_DB is required}
      SC_DATABASE_VOLUME: ${SC_DATABASE_VOLUME:?SC_DATABASE_VOLUME is required}
      SC_REDIS_VOLUME: ${SC_REDIS_VOLUME:?SC_REDIS_VOLUME is required}
      SC_FILESTORE_VOLUME: ${SC_FILESTORE_VOLUME:?SC_FILESTORE_VOLUME is required}
      SC_SESSION_VOLUME: ${SC_SESSION_VOLUME:?SC_SESSION_VOLUME is required}
      SC_TMP_VOLUME: ${SC_TMP_VOLUME:?SC_TMP_VOLUME is required}
      SC_LOG_VOLUME: ${SC_LOG_VOLUME:?SC_LOG_VOLUME is required}
      EXPECTED_RELEASE_SHA: ${EXPECTED_RELEASE_SHA:?EXPECTED_RELEASE_SHA is required}
      EXPECTED_IMAGE_DIGEST: ${EXPECTED_IMAGE_DIGEST:?EXPECTED_IMAGE_DIGEST is required}
      RELEASE_MANIFEST_PATH: /opt/sce-release/product-release-manifest.json
      RELEASE_MANIFEST_CHECKSUM_PATH: /opt/sce-release/product-release-manifest.sha256
      SC_PRODUCTION_CHANGE_APPROVED: ${SC_PRODUCTION_CHANGE_APPROVED:-}
      TARGET_MODULE: ${TARGET_MODULE:-}
      SC_CONTRACT_TEST_MODE: ${SC_CONTRACT_TEST_MODE:-0}
      SC_ALLOW_DEMO_DATA: "0"
      SCENE_CHANNEL: ${SCENE_CHANNEL:-stable}
      SCENE_USE_PINNED: ${SCENE_USE_PINNED:-1}
      SCENE_ROLLBACK: ${SCENE_ROLLBACK:-0}
    volumes:
      - filestore_data:/opt/sce-runtime/filestore
      - session_data:/opt/sce-runtime/sessions
      - tmp_data:/opt/sce-runtime/tmp
      - log_data:/opt/sce-runtime/logs
      - ${RELEASE_MANIFEST_PATH:?RELEASE_MANIFEST_PATH is required}:/opt/sce-release/product-release-manifest.json:ro
      - ${RELEASE_MANIFEST_CHECKSUM_PATH:?RELEASE_MANIFEST_CHECKSUM_PATH is required}:/opt/sce-release/product-release-manifest.sha256:ro
    ports:
      - "127.0.0.1:${CANDIDATE_ODOO_PORT:-18089}:8069"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8069/web/login', timeout=8)\""]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 90s

  nginx:
    image: ${NGINX_IMAGE_REF:?NGINX_IMAGE_REF with image@sha256 digest is required}
    user: root
    entrypoint: ["/usr/local/bin/render_nginx_conf.sh"]
    restart: unless-stopped
    depends_on:
      odoo:
        condition: service_healthy
    environment:
      ODOO_DB: ${TARGET_DB:?TARGET_DB is required}
    ports:
      - "127.0.0.1:${CANDIDATE_NGINX_PORT:-18088}:80"
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  database_data:
    name: ${SC_DATABASE_VOLUME:?SC_DATABASE_VOLUME is required}
  redis_data:
    name: ${SC_REDIS_VOLUME:?SC_REDIS_VOLUME is required}
  filestore_data:
    name: ${SC_FILESTORE_VOLUME:?SC_FILESTORE_VOLUME is required}
  session_data:
    name: ${SC_SESSION_VOLUME:?SC_SESSION_VOLUME is required}
  tmp_data:
    name: ${SC_TMP_VOLUME:?SC_TMP_VOLUME is required}
  log_data:
    name: ${SC_LOG_VOLUME:?SC_LOG_VOLUME is required}
